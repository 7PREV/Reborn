name: Build RivalsGuard EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/rivals_guard/**
      - .github/workflows/build-exe.yml

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend/rivals_guard
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build RivalsGuard.exe
        working-directory: backend/rivals_guard
        run: |
          pyinstaller --clean --noconfirm --onefile --name RivalsGuard guard_client.py

      - name: Copy EXE to public backend folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path backend/static/downloads | Out-Null
          Copy-Item -Path backend/rivals_guard/dist/RivalsGuard.exe -Destination backend/static/downloads/RivalsGuard.exe -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: RivalsGuard-windows-exe
          path: backend/static/downloads/RivalsGuard.exe
          if-no-files-found: error

      - name: Publish/Update stable GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: rivalsguard-latest
          name: RivalsGuard Latest
          body: |
            Automated Windows build of Rivals Guard.
            Download: RivalsGuard.exe
          artifacts: backend/static/downloads/RivalsGuard.exe
          artifactContentType: application/vnd.microsoft.portable-executable
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          makeLatest: true
          draft: false
          prerelease: false

      - name: Commit updated EXE to repository
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/static/downloads/RivalsGuard.exe
          if git diff --cached --quiet; then
            echo "No EXE change to commit."
            exit 0
          fi
          git commit -m "chore: update RivalsGuard.exe [skip ci]"
          git push
